name: Release MSIX

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-msix:
    runs-on: windows-latest
    env:
      MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
      MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
      MSIX_DISPLAY_NAME: ${{ vars.MSIX_DISPLAY_NAME }}
      MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.MSIX_PUBLISHER_DISPLAY_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate MSIX config
        shell: pwsh
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:MSIX_IDENTITY_NAME)) { $missing += "MSIX_IDENTITY_NAME (Repository Variable)" }
          if ([string]::IsNullOrWhiteSpace($env:MSIX_PUBLISHER)) { $missing += "MSIX_PUBLISHER (Repository Variable)" }
          if ($missing.Count -gt 0) {
            Write-Error ("Configuracao ausente: " + ($missing -join ", "))
            exit 1
          }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build and release MSIX
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/release-msix.ps1 `
            -IdentityName "$env:MSIX_IDENTITY_NAME" `
            -DisplayName "$env:MSIX_DISPLAY_NAME" `
            -Publisher "$env:MSIX_PUBLISHER" `
            -PublisherDisplayName "$env:MSIX_PUBLISHER_DISPLAY_NAME"
