name: Release MSI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version from Cargo.toml
        id: app_version
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Nao foi possivel extrair a versao do Cargo.toml"
            exit 1
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Detect if release should run
        id: release_guard
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.app_version.outputs.tag }}
        run: |
          git fetch --tags --force
          $tag = $env:RELEASE_TAG
          $existing = git tag -l $tag
          if (-not [string]::IsNullOrWhiteSpace($existing)) {
            Write-Host "Tag $tag ja existe. Este push sera concluido sem publicar novo release."
            "should_release=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }
          Write-Host "Tag $tag ainda nao existe. Release sera publicada."
          "should_release=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup Rust
        if: steps.release_guard.outputs.should_release == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cargo-wix
        if: steps.release_guard.outputs.should_release == 'true'
        shell: pwsh
        run: cargo install cargo-wix --locked

      - name: Install WiX Toolset
        if: steps.release_guard.outputs.should_release == 'true'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Configure WiX on PATH
        if: steps.release_guard.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $candidates = @(
            "${env:WIX}\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin",
            "C:\Program Files\WiX Toolset v3.11\bin"
          )
          $wixBin = $candidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $wixBin) {
            Write-Error "WiX Toolset instalado, mas pasta bin nao foi encontrada."
            exit 1
          }
          "PATH=$wixBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "WiX configurado em $wixBin"

      - name: Build release binary
        if: steps.release_guard.outputs.should_release == 'true'
        shell: pwsh
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Build MSI
        if: steps.release_guard.outputs.should_release == 'true'
        shell: pwsh
        run: cargo wix --no-build --target x86_64-pc-windows-msvc

      - name: Rename MSI artifact
        id: artifact
        if: steps.release_guard.outputs.should_release == 'true'
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          $msi = Get-ChildItem -Path target\wix -Filter *.msi | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msi) {
            Write-Error "Nenhum arquivo MSI foi gerado em target\\wix"
            exit 1
          }
          $assetName = "assinador-livre-rs-$env:APP_VERSION-x64.msi"
          $assetPath = Join-Path $msi.DirectoryName $assetName
          Copy-Item $msi.FullName $assetPath -Force
          "asset_path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        if: steps.release_guard.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.tag }}
          name: ${{ steps.app_version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.asset_path }}
